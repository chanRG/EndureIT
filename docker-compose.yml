services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: endureit_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-endureit_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-endureit_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-endureit_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - endureit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-endureit_user}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: endureit_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - endureit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: endureit_backend
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-endureit_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-endureit_secure_password}
      - POSTGRES_DB=${POSTGRES_DB:-endureit_db}
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this}
      - DEBUG=${DEBUG:-true}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - STRAVA_CLIENT_ID=${STRAVA_CLIENT_ID}
      - STRAVA_CLIENT_SECRET=${STRAVA_CLIENT_SECRET}
      - STRAVA_ACCESS_TOKEN=${STRAVA_ACCESS_TOKEN:-dfed41236232e0408108093c3f077d95cbbb2465}
      - STRAVA_REFRESH_TOKEN=${STRAVA_REFRESH_TOKEN}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/main.py:/app/main.py
    networks:
      - endureit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: endureit_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for SSL certificates
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - endureit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: endureit_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - endureit-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  endureit-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

