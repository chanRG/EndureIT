name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan \
            --exclude-files '\.env$|\.env\..*|package-lock\.json|\.secrets\.baseline' \
            > /tmp/new-baseline.json
          # Compare against committed baseline — fail if new secrets found
          detect-secrets audit --diff .secrets.baseline /tmp/new-baseline.json || {
            echo "New potential secrets detected. Run 'detect-secrets scan > .secrets.baseline' locally to review and update the baseline."
            exit 1
          }
