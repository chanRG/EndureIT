name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan \
            --exclude-files '\.env$|\.env\..*|package-lock\.json|\.secrets\.baseline' \
            > /tmp/new-baseline.json

          # Extract and compare only the results section (ignore metadata/timestamps)
          python3 - <<'EOF'
          import json, sys

          with open(".secrets.baseline") as f:
              baseline = json.load(f)
          with open("/tmp/new-baseline.json") as f:
              new_scan = json.load(f)

          baseline_files = set(baseline.get("results", {}).keys())
          new_files = set(new_scan.get("results", {}).keys())

          added = new_files - baseline_files
          if added:
              print(f"New secrets detected in files: {added}")
              print("Run 'detect-secrets scan > .secrets.baseline' locally to review and commit the updated baseline.")
              sys.exit(1)
          else:
              print("No new secrets detected.")
          EOF
